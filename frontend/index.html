<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能助手</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-container">
    <!-- Simplified Header -->
    <header class="header">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="切换会话列表">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="header-title">AI 助手</div>
      <div class="header-actions">
        <button class="btn" id="btn-onboarding" title="查看介绍">介绍</button>
        <button class="btn" id="btn-history">Checkpoints</button>
        <button class="btn" id="btn-reset">新会话</button>
      </div>
    </header>

    <div class="main-layout">
      <!-- Session Sidebar (left) -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Chat Panel -->
        <div class="chat-panel">
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-area">
            <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
            <div class="input-row">
              <textarea
                id="chat-input"
                class="chat-input"
                placeholder="输入你的 IT 问题，例如：VPN 怎么连接？"
                rows="1"
                autofocus
              ></textarea>
              <button id="send-btn" class="send-btn">发送</button>
              <button id="interrupt-btn" class="interrupt-btn" style="display:none">中断</button>
            </div>
          </div>
        </div>

        <!-- Graph Panel (right) -->
        <div class="graph-panel" id="graph-panel">
          <div class="graph-panel-title">Agent 执行流程</div>
          <div id="graph-container"></div>
        </div>
      </div>
    </div>

    <!-- Modification Panel -->
    <div class="modification-panel" id="modification-panel"></div>

    <!-- Checkpoint Panel -->
    <div class="checkpoint-panel" id="checkpoint-panel"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <script type="module">
    import { initApp } from './js/app.js';
    import { toggleCheckpointPanel } from './js/branch.js';
    import { openOnboarding, maybeShowOnboarding } from './js/onboarding.js';
    import { createNewSession } from './js/session.js';

    initApp();
    maybeShowOnboarding();

    document.getElementById('btn-reset').addEventListener('click', createNewSession);
    document.getElementById('btn-history').addEventListener('click', toggleCheckpointPanel);
    document.getElementById('btn-onboarding').addEventListener('click', openOnboarding);
  </script>
</body>
</html>
